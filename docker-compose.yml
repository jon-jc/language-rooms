
# Local development infrastructure for LanguageRooms.
# - postgres: primary datastore (users, rooms, moderation data)
# - livekit:  SFU (Selective Forwarding Unit) for multi-party WebRTC
#             video/voice, with embedded TURN for NAT traversal.
#
# The Next.js app itself runs with `npm run dev` during development;
# a containerized app service (`app`) is defined for full-stack runs.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: languagerooms
      POSTGRES_PASSWORD: languagerooms_dev
      POSTGRES_DB: languagerooms
    ports:
      - "5434:5432"  # 5434 on host: native Postgres owns 5432, lingorooms owns 5433
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U languagerooms"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Containerized app — full-stack runs: docker compose --profile full up
  # (default dev flow keeps the app on the host via `npm run dev`).
  app:
    profiles: ["full"]
    build:
      context: .
      args:
        NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7890
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://languagerooms:languagerooms_dev@postgres:5432/languagerooms
      SESSION_SECRET: compose_dev_only_change_me_in_production_0123456789abcdef
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecret_languagerooms_local_only_0123456789abcdef
      LIVEKIT_HOST: http://livekit:7890
      NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7890
      CONTENT_MODERATION_PROVIDER: stub
      APP_BASE_URL: http://localhost:3000
      LOG_LEVEL: info
    volumes:
      - evidence:/data/evidence
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  livekit:
    image: livekit/livekit-server:v1.9
    command: --config /etc/livekit.yaml --node-ip 127.0.0.1
    ports:
      - "7890:7890"          # WebSocket signaling + HTTP API (7890 to avoid conflicts with other local projects)
      - "7891:7891"          # WebRTC over TCP (fallback when UDP is blocked)
      - "3479:3479/udp"      # Embedded TURN/UDP for NAT traversal
      - "52000-52100:52000-52100/udp" # WebRTC UDP media ports
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  pgdata:
  evidence:
  uploads:
